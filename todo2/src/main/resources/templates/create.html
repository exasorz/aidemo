<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ToDo新規作成</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/todos">ToDoアプリ</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div th:if="${alert}" class="alert alert-dismissible fade show" th:classappend="${alert.type}">
            <span th:text="${alert.message}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <h1>ToDo新規作成</h1>

        <form th:object="${todo}" th:action="@{/todos/create}" method="post">
            <div class="mb-3">
                <label for="title" class="form-label">タイトル *</label>
                <input type="text" class="form-control" id="title" th:field="*{title}" required>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
            </div>

            <div class="mb-3">
                <label for="description" class="form-label">説明</label>
                <textarea class="form-control" id="description" th:field="*{description}" rows="3"></textarea>
            </div>

            <div class="mb-3">
                <label for="dueDate" class="form-label">期限</label>
                <input type="date" class="form-control" id="dueDate" th:field="*{dueDate}">
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">作成</button>
                <a href="/todos" class="btn btn-secondary">キャンセル</a>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
