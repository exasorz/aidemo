<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ToDo一覧</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/todos">ToDoアプリ</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div th:if="${alert}" class="alert alert-dismissible fade show" th:classappend="${alert.type}">
            <span th:text="${alert.message}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1>ToDo一覧</h1>
            <a href="/todos/new" class="btn btn-primary">新規作成</a>
        </div>

        <div class="table-responsive">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>タイトル</th>
                        <th>説明</th>
                        <th>期限</th>
                        <th>ステータス</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="todo : ${todos}">
                        <td th:text="${todo.id}"></td>
                        <td th:text="${todo.title}"></td>
                        <td th:text="${todo.description}"></td>
                        <td th:text="${#temporals.format(todo.dueDate, 'yyyy-MM-dd')}"></td>
                        <td>
                            <form th:action="@{/todos/update-status/{id}(id=${todo.id})}" method="post" style="display:inline;">
                                <input type="hidden" name="completed" th:value="${!todo.completed}">
                                <button type="submit" class="btn btn-sm"
                                    th:classappend="${todo.completed ? 'btn-success' : 'btn-outline-secondary'}"
                                    th:text="${todo.completed ? '完了' : '未完了'}">
                                </button>
                            </form>
                        </td>
                        <td>
                            <a th:href="@{/todos/edit/{id}(id=${todo.id})}" class="btn btn-sm btn-outline-primary">編集</a>
                            <form th:action="@{/todos/delete/{id}(id=${todo.id})}" method="post" style="display:inline;">
                                <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('削除してもよろしいですか？')">削除</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div th:if="${todos.empty}" class="text-center">
            <p>ToDoがありません。</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
